name: Replace square textures

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Replace all square*.png
        run: |
          echo "Searching files..."
          files=$(grep -rl 'square.*\.png' . || true)

          if [ -z "$files" ]; then
            echo "No matches found"
            exit 0
          fi

          echo "Files found:"
          echo "$files"

          echo "$files" | xargs sed -i 's/square[^"]*\.png/idbot_bg.png/g'

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto replace square textures -> idbot_bg.png"
            git push
          fi
