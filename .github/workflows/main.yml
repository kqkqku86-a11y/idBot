name: Replace Popup Background

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  replace-bg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Replace square01_001.png -> idbot_bg.png
        run: |
          grep -rl 'square01_001.png' src/ | xargs sed -i 's/square01_001.png/idbot_bg.png/g' || true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto replace popup bg: square01_001.png -> idbot_bg.png"
            git push
          fi
